const B=({c,children})=><span style={{display:"inline-block",padding:"2px 7px",borderRadius:5,fontSize:9,fontWeight:700,background:c+"18",color:c,letterSpacing:.5}}>{children}</span>;
const P=({p,c})=><div style={{height:4,borderRadius:2,background:"var(--bd)",overflow:"hidden"}}><div style={{height:"100%",width:`${p}%`,background:c,borderRadius:2,transition:"width .4s"}}/></div>;
const CK=({on,onClick})=><div onClick={onClick} style={{width:22,height:22,borderRadius:7,border:on?"none":"2px solid var(--bd)",background:on?"var(--gn)":"transparent",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0}}>{on&&<span style={{color:"#fff",fontSize:11,fontWeight:800}}>✓</span>}</div>;

function Sec({title,right,children,open:defaultOpen=true}){
  const [o,sO]=useState(defaultOpen);
  return <div style={{background:"var(--c1)",borderRadius:14,margin:"0 12px 8px",border:"1px solid var(--bd)",overflow:"hidden"}}>
    <div onClick={()=>sO(!o)} style={{padding:"13px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}}>
      <span style={{fontSize:14,fontWeight:700,color:"#e2e5ed"}}>{title}</span>
      <div style={{display:"flex",alignItems:"center",gap:8}}>{right}<span style={{fontSize:11,color:"var(--dm)",transform:o?"rotate(180deg)":"none",transition:".2s"}}>▼</span></div>
    </div>
    {o && <div style={{padding:"0 16px 14px"}}>{children}</div>}
  </div>;
}

}

  const up=useCallback(fn=>{_setSt(prev=>{const next=typeof fn==="function"?fn(prev):fn;if(ar.current)clearTimeout(ar.current);ar.current=setTimeout(()=>{LS.set("la_s",next);setSaveMsg("ok");setTimeout(()=>setSaveMsg(p=>p==="ok"?null:p),2e3)},1500);return next})},[]);

        {[{id:0,l:"🍽️ Refeições"},{id:1,l:"🛒 Compras"},{id:2,l:"🏋️ Treino"},{id:3,l:"🍳 Receitas"}].map(t=>
          <button key={t.id} onClick={()=>setDietTab(t.id)} style={{flex:1,padding:"8px 2px",background:dietTab===t.id?"var(--c1)":"transparent",color:dietTab===t.id?"#fff":"var(--dm)",border:"none",borderRadius:8,fontSize:9,fontWeight:dietTab===t.id?700:500,cursor:"pointer"}}>{t.l}</button>
        )}
      </div>

      {dietTab===0&&<div>
        <div style={{padding:"0 16px 8px"}}><div style={{fontSize:13,fontWeight:700,color:"#e2e5ed"}}>{curDiet.name}</div><div style={{fontSize:10,color:"var(--dm)"}}>{curDiet.vibe} · {curDiet.cost}/sem · {curDiet.prep}</div></div>
        <div style={{background:"var(--c1)",borderRadius:14,margin:"0 12px 8px",border:bd}}>
          {curDiet.meals.map((m,i)=><div key={i} style={{padding:"10px 16px",borderTop:i?bd:"none"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}><span style={{fontSize:12,fontWeight:700,color:"var(--ac)"}}>{m.t} · {m.h}</span><span style={{fontSize:10,color:"var(--dm)"}}>{m.k}kcal</span></div>
            <div style={{fontSize:12,color:"#e2e5ed",lineHeight:1.4}}>{m.f}</div>
            <div style={{display:"flex",gap:8,marginTop:4}}><span style={{fontSize:9,color:"var(--rd)"}}>{m.p}g P</span><span style={{fontSize:9,color:"var(--am)"}}>{m.c}g C</span><span style={{fontSize:9,color:"var(--gn)"}}>{m.l}g G</span></div>
          </div>)}
        </div>
        <div style={{margin:"0 12px",padding:12,background:"var(--c1)",borderRadius:12,border:"1px solid rgba(249,115,22,.2)",fontSize:11,color:"var(--am)"}}>💡 Frango Aldi (£5.20/kg) economiza ~20%. Whey Myprotein = mais barato.</div>
      </div>}

      {dietTab===1&&<div>
        <div style={{padding:"0 16px 8px"}}><div style={{fontSize:13,fontWeight:700,color:"#e2e5ed"}}>🛒 {curDiet.name}</div><div style={{fontSize:10,color:"var(--dm)"}}>Quantidades semanais · {curDiet.cost}</div></div>
        {curDiet.grocery.map((gr,gi)=>
          <div key={gi} style={{background:"var(--c1)",borderRadius:14,margin:"0 12px 8px",border:bd,padding:"10px 16px"}}>
            <div style={{fontSize:13,fontWeight:700,color:"#e2e5ed",marginBottom:6}}>{gr.g}</div>
            {gr.items.map((it,ii)=><div key={ii} style={{display:"flex",gap:10,padding:"5px 0",alignItems:"center"}}>
              <CK on={tv(`gr_${dietIdx}_${gi}_${ii}`)} onClick={()=>tg(`gr_${dietIdx}_${gi}_${ii}`)}/><span style={{fontSize:12,color:tv(`gr_${dietIdx}_${gi}_${ii}`)?"var(--dm)":"#e2e5ed"}}>{it}</span>
            </div>)}
          </div>
        )}
      </div>}

      {dietTab===2&&<div>
        <div style={{padding:"0 16px 8px"}}><div style={{fontSize:13,fontWeight:700,color:"#e2e5ed"}}>{curWork.name}</div><div style={{fontSize:10,color:"var(--dm)"}}>{curWork.focus} · {curWork.tech}</div></div>
        <div style={{margin:"0 12px 8px",padding:12,background:"var(--c1)",borderRadius:12,border:bd}}>
          <div style={{fontSize:12,fontWeight:700,color:pplDay==="Rest"?"var(--gn)":"var(--ac)",marginBottom:4}}>Hoje: {pplDay}</div>
          <div style={{fontSize:10,color:"var(--dm)"}}>PPL 5x/sem · Seg-Sex</div>
        </div>
        {exKey?EXERCISES[exKey].map((ex,i)=>
          <a key={i} href={ex.u} target="_blank" rel="noopener noreferrer" style={{display:"flex",alignItems:"center",gap:8,padding:"10px 12px",margin:"0 12px 6px",background:"var(--c2)",borderRadius:10,border:bd,textDecoration:"none",color:"var(--tx)"}}>
            <span style={{fontSize:16}}>▶️</span><span style={{flex:1,fontSize:12,fontWeight:600,color:"#e2e5ed"}}>{ex.n}</span><span style={{fontSize:9,color:"var(--dm)"}}>YouTube ↗</span>
          </a>
        ):<div style={{margin:"0 12px",padding:16,background:"var(--c1)",borderRadius:12,border:bd,textAlign:"center"}}><div style={{fontSize:24,marginBottom:6}}>🧘</div><div style={{fontSize:13,fontWeight:700,color:"#e2e5ed"}}>Descanso</div></div>}
      </div>}

      {dietTab===3&&<div>
        <div style={{padding:"0 16px 8px"}}><div style={{fontSize:13,fontWeight:700,color:"#e2e5ed"}}>🍳 Receitas Fitness</div></div>
        {RECIPES.map((r,i)=>
          <a key={i} href={r.u} target="_blank" rel="noopener noreferrer" style={{display:"flex",alignItems:"center",gap:8,padding:"10px 12px",margin:"0 12px 6px",background:"var(--c2)",borderRadius:10,border:bd,textDecoration:"none",color:"var(--tx)"}}>
            <span style={{fontSize:16}}>▶️</span><div style={{flex:1}}><div style={{fontSize:12,fontWeight:600,color:"#e2e5ed"}}>{r.n}</div><div style={{fontSize:10,color:"var(--dm)"}}>{r.a}</div></div><span style={{fontSize:9,color:"var(--dm)"}}>↗</span>
          </a>
        )}
      </div>}
    </div>}

    {/* ═══ PLAN ═══ */}
    {tab==="plan"&&<div style={{padding:"10px 0"}}>
      <div style={{display:"flex",gap:6,margin:"0 12px 10px"}}>{PH.map((ph,i)=><button key={i} onClick={()=>setPhase(i)} style={{flex:1,padding:"10px 4px",background:phase===i?ph.c+"20":"var(--c1)",border:phase===i?`2px solid ${ph.c}`:"2px solid var(--bd)",borderRadius:12,color:phase===i?ph.c:"var(--dm)",cursor:"pointer",fontSize:10,fontWeight:700,textAlign:"center"}}><div style={{fontSize:15}}>{"⚡🔮🔥"[i]}</div>Sem {ph.w}<br/>{pp(i)}%</button>)}</div>
      <div style={{padding:"0 12px 6px"}}><div style={{fontSize:17,fontWeight:800,color:PH[phase].c}}>Fase {PH[phase].id} — {PH[phase].t}</div><P p={pp(phase)} c={PH[phase].c}/></div>
      {PH[phase].tk.map(t=><div key={t.id} onClick={()=>tog(t.id)} style={{display:"flex",gap:10,padding:"11px 16px",margin:"0 12px 4px",background:"var(--c1)",borderRadius:12,border:bd,cursor:"pointer",opacity:st[t.id]?.45:1}}><CK on={st[t.id]}/><span style={{fontSize:12}}>{t.g}</span><span style={{fontSize:13,fontWeight:500,color:st[t.id]?"var(--dm)":"var(--tx)",textDecoration:st[t.id]?"line-through":"none"}}>{t.t}</span></div>)}

      <div style={{padding:"16px 16px 6px"}}><div style={{fontSize:15,fontWeight:800,color:"#fff"}}>📚 Ciência</div></div>
      {KNOW.map((c,ci)=><div key={ci} style={{margin:"0 12px 4px"}}><div style={{display:"flex",alignItems:"center",gap:6,padding:"6px 0"}}><span>{c.i}</span><span style={{fontSize:13,fontWeight:800,color:c.cl}}>{c.cat}</span></div>
        {c.cd.map((k,ki)=>{const o=openK===`${ci}_${ki}`;return<div key={ki} style={{background:"var(--c1)",borderRadius:12,marginTop:4,border:bd,overflow:"hidden"}}><div onClick={()=>setOpenK(o?null:`${ci}_${ki}`)} style={{padding:"10px 14px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:12,fontWeight:700,color:"#e2e5ed"}}>{k.t}</span><span style={{fontSize:10,color:"var(--dm)",transform:o?"rotate(180deg)":"none",transition:".2s"}}>▼</span></div>{o&&<div style={{padding:"0 14px 12px",fontSize:11,color:"var(--tx)",lineHeight:1.6,borderTop:bd}}>{k.b}</div>}</div>})}
      </div>)}
      <SaveBtn/>
    </div>}

    {/* ═══ SHOP ═══ */}
    {tab==="shop"&&<div style={{padding:"10px 0"}}>
      <div style={{display:"flex",justifyContent:"space-between",padding:"0 16px 10px"}}><div><div style={{fontSize:17,fontWeight:800,color:"#fff"}}>Compras</div><div style={{fontSize:10,color:"var(--dm)"}}>Nome→loja · check→comprado</div></div><div style={{textAlign:"right"}}><div style={{fontSize:18,fontWeight:800,color:"var(--gn)"}}>£{spt}</div></div></div>
      {SHOP.map((c,ci)=>{const o=openCat[ci]!==false;return<div key={ci} style={{background:"var(--c1)",borderRadius:14,margin:"0 12px 8px",border:bd,overflow:"hidden"}}>
        <div onClick={()=>setOpenCat(p=>({...p,[ci]:!o}))} style={{padding:"13px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}}><div style={{display:"flex",alignItems:"center",gap:8}}><span>{c.i}</span><span style={{fontSize:14,fontWeight:700,color:"#e2e5ed"}}>{c.cat}</span></div><span style={{fontSize:11,color:"var(--dm)",transform:o?"rotate(180deg)":"none",transition:".2s"}}>▼</span></div>
        {o&&c.items.map((it,ii)=>{const b=st[`b_${c.cat}_${ii}`];return<div key={ii} style={{display:"flex",gap:10,padding:"10px 16px",borderTop:bd,alignItems:"center",opacity:b?.4:1}}><CK on={b} onClick={()=>tog(`b_${c.cat}_${ii}`)}/><div style={{flex:1,minWidth:0}}><a href={it.u} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()} style={{fontSize:12,fontWeight:500,textDecoration:b?"line-through":"none",display:"block"}}>{it.n} ↗</a><B c={PH[it.ph-1].c}>Fase {it.ph}</B></div><span style={{fontSize:12,fontWeight:700,color:"var(--gn)"}}>£{it.p}</span></div>})}
      </div>})}
      <SaveBtn/>
    </div>}

    {/* ═══ PROFILE ═══ */}
    {tab==="me"&&<div style={{padding:"10px 0"}}>
      <div style={{background:"var(--c1)",borderRadius:14,margin:"0 12px 8px",padding:"14px 16px",border:bd}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}><span style={{fontSize:14,fontWeight:700,color:"#e2e5ed"}}>⚙️ Perfil</span><button onClick={()=>setEditProf(!editProf)} style={{padding:"4px 10px",background:editProf?"rgba(16,185,129,.15)":"var(--c2)",border:editProf?"1px solid var(--gn)":"1px solid var(--bd)",borderRadius:6,color:editProf?"var(--gn)":"var(--dm)",fontSize:10,fontWeight:700,cursor:"pointer"}}>{editProf?"Fechar":"Editar"}</button></div>
        {editProf?<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          {[{k:"name",l:"Nome",t:"text"},{k:"weight",l:"Peso"},{k:"bf",l:"BF%"},{k:"bfGoal",l:"Meta BF%"},{k:"kcal",l:"Kcal"},{k:"prot",l:"Prot (g)"}].map(f=><div key={f.k}><label style={{fontSize:10,color:"var(--dm)",marginBottom:2,display:"block"}}>{f.l}</label><input type={f.t||"number"} value={prof[f.k]||""} onChange={e=>spf(f.k,f.t==="text"?e.target.value:(+e.target.value||0))}/></div>)}
        </div>:<div style={{display:"flex",gap:6,flexWrap:"wrap"}}><B c="var(--ac)">{prof.weight}kg</B><B c="var(--rd)">BF {prof.bf}→{prof.bfGoal}%</B><B c="var(--gn)">{prof.kcal}kcal·{prof.prot}g</B><B c="var(--pu)">Dia {dayN}·F{cp+1}</B></div>}
      </div>

      {wHist.length>=2&&<div style={{background:"var(--c1)",borderRadius:14,margin:"0 12px 8px",padding:"14px 16px",border:bd}}>
        <div style={{fontSize:13,fontWeight:700,color:"#e2e5ed",marginBottom:8}}>⚖️ Peso ({wHist.length})</div>
        <div style={{display:"flex",gap:2,alignItems:"flex-end",height:70}}>
          {(()=>{const mn=Math.min(...wHist.map(w=>w.w))-.3;const mx=Math.max(...wHist.map(w=>w.w))+.3;const rn=mx-mn||1;return wHist.map((w,i)=>{const h=((w.w-mn)/rn)*60+10;return<div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:1}}><div style={{fontSize:7,color:i===wHist.length-1?"var(--ac)":"var(--dm)",fontWeight:i===wHist.length-1?700:400}}>{w.w}</div><div style={{width:"100%",height:h,background:i===wHist.length-1?"var(--ac)":"rgba(14,165,233,.25)",borderRadius:2}}/><div style={{fontSize:6,color:"var(--dm)"}}>{w.d}</div></div>})})()}
        </div>
      </div>}

      <div style={{background:"var(--c1)",borderRadius:14,margin:"0 12px 8px",padding:"14px 16px",border:bd}}><div style={{fontSize:13,fontWeight:700,color:"#e2e5ed",marginBottom:8}}>Body Fat → Face</div><div style={{display:"flex",gap:3}}>
        {[{r:"<8",l:"Gaunt",lo:0,hi:8},{r:"8-12",l:"Ideal",lo:8,hi:12},{r:"12-15",l:"Lean",lo:12,hi:15},{r:"15-18",l:"OK",lo:15,hi:18},{r:"18-22",l:"Soft",lo:18,hi:22},{r:">22",l:"Hidden",lo:22,hi:99}].map((z,i)=>{const bf=+(prof.bf||20);const isU=bf>=z.lo&&bf<z.hi;const isG=i===1||i===2;return<div key={i} style={{flex:1,textAlign:"center",padding:"7px 2px",borderRadius:6,background:isU?"rgba(239,68,68,.12)":isG?"rgba(16,185,129,.08)":"transparent",border:isU?"1px solid rgba(239,68,68,.3)":isG?"1px solid rgba(16,185,129,.15)":"1px solid rgba(28,32,48,.25)"}}><div style={{fontSize:8,fontWeight:700,color:isU?"var(--rd)":isG?"var(--gn)":"var(--dm)"}}>{z.r}%</div><div style={{fontSize:7,color:"var(--dm)"}}>{z.l}</div>{isU&&<div style={{fontSize:6,color:"var(--rd)"}}>Tu</div>}</div>})}
      </div></div>

      <div style={{background:"var(--c1)",borderRadius:14,margin:"0 12px 8px",padding:"14px 16px",border:bd}}><div style={{fontSize:13,fontWeight:700,color:"#e2e5ed",marginBottom:8}}>Rotações (semana {weekN+1})</div>
        {[{l:"Dieta",it:DIETS.map(d=>d.name.split(" ")[0])},{l:"Treino",it:WORKOUTS.map(w=>w.name.split(" ")[0])}].map((r,ri)=>
          <div key={ri} style={{marginTop:ri?8:0}}><div style={{fontSize:10,fontWeight:700,color:"var(--dm)",marginBottom:3}}>{r.l}</div><div style={{display:"flex",gap:3}}>{r.it.map((it,ii)=><div key={ii} style={{flex:1,padding:"6px 3px",borderRadius:7,background:weekN%3===ii?"rgba(14,165,233,.12)":"transparent",border:weekN%3===ii?"1px solid rgba(14,165,233,.3)":"1px solid rgba(28,32,48,.25)",textAlign:"center"}}><div style={{fontSize:9,fontWeight:weekN%3===ii?700:400,color:weekN%3===ii?"var(--ac)":"var(--dm)"}}>{it}</div></div>)}</div></div>
        )}
      </div>

      <SaveBtn full/>
      <div style={{textAlign:"center",marginTop:10}}><button onClick={()=>{if(confirm("Resetar TUDO e voltar ao setup?")){localStorage.removeItem("la_s");localStorage.removeItem("la_p");location.reload()}}} style={{background:"none",border:"none",color:"var(--dm)",fontSize:10,cursor:"pointer",padding:8}}>Resetar tudo</button></div>
    </div>}

    {/* NAV */}
    <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:99,background:"var(--c1)",borderTop:"1px solid var(--bd)",display:"flex",justifyContent:"center",padding:"5px 0 env(safe-area-inset-bottom,5px)"}}>
      <div style={{display:"flex",gap:1,maxWidth:500,width:"100%",padding:"0 4px"}}>
        {[{id:"today",i:"◉",l:"Hoje"},{id:"diet",i:"◈",l:"Dieta"},{id:"plan",i:"◇",l:"Plano"},{id:"shop",i:"△",l:"Compras"},{id:"me",i:"◎",l:"Perfil"}].map(t=>
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"7px 2px",background:"none",border:"none",color:tab===t.id?"var(--ac)":"var(--dm)",fontSize:9,fontWeight:600,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}><span style={{fontSize:17}}>{t.i}</span>{t.l}</button>
        )}
      </div>
    </div>
  </div>;
}

/* ═══════════ ROOT ═══════════ */
function Root(){
  const [p,sP]=useState(()=>LS.get("la_p"));
  if(!p) return <Onboarding onComplete={sP}/>;
  return <Main profile={p}/>;
}
ReactDOM.createRoot(document.getElementById("R")).render(<Root/>);
</script>
</body>
</html>
