<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#06070b;--c1:#0d0f16;--c2:#141722;--bd:#1c2030;--tx:#c2c8d8;--dm:#4e5672;--ac:#0ea5e9;--gn:#10b981;--rd:#ef4444;--pu:#8b5cf6;--am:#f59e0b}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;min-height:100dvh;max-width:500px;margin:0 auto;padding-bottom:env(safe-area-inset-bottom,0)}
input,textarea,select,button{font-family:inherit}
input[type=number],input[type=text],textarea,select{width:100%;padding:10px 12px;background:var(--c2);border:1px solid var(--bd);border-radius:8px;color:#e2e5ed;font-size:14px;font-weight:600;outline:none;-webkit-appearance:none}
textarea{resize:vertical;font-size:12px}
a{color:#7cb8f0;text-decoration:none}
.badge{display:inline-block;padding:2px 7px;border-radius:5px;font-size:9px;font-weight:700;letter-spacing:.5px}
.prog{height:4px;border-radius:2px;background:var(--bd);overflow:hidden}
.prog>div{height:100%;border-radius:2px;transition:width .4s}
.chk{width:22px;height:22px;border-radius:7px;border:2px solid var(--bd);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .15s}
.chk.on{border:none;background:var(--gn)}
.card{background:var(--c1);border-radius:14px;margin:0 12px 8px;border:1px solid var(--bd);overflow:hidden}
.card-h{padding:13px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.card-h h3{font-size:14px;font-weight:700;color:#e2e5ed}
.nav{position:fixed;bottom:0;left:0;right:0;z-index:99;background:var(--c1);border-top:1px solid var(--bd);display:flex;justify-content:center;padding:5px 0 env(safe-area-inset-bottom,5px)}
.nav-in{display:flex;gap:1px;max-width:500px;width:100%;padding:0 4px}
.nav-b{flex:1;padding:7px 2px;background:none;border:none;font-size:9px;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px}
.nav-b .ni{font-size:17px}
.save-btn{width:100%;padding:14px;border-radius:14px;font-size:14px;font-weight:800;cursor:pointer;transition:all .3s;border-width:2px;border-style:solid;letter-spacing:.5px}
/* Onboarding */
.ob-wrap{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;justify-content:center;padding:24px 20px}
.ob-title{font-size:28px;font-weight:800;color:#fff;text-align:center;margin-bottom:4px}
.ob-sub{font-size:13px;color:var(--dm);text-align:center;margin-bottom:24px}
.ob-label{font-size:11px;font-weight:700;color:var(--dm);margin-bottom:4px;display:block}
.ob-row{display:flex;gap:10px;margin-bottom:14px}
.ob-row>div{flex:1}
.ob-next{width:100%;padding:16px;background:var(--ac);border:none;border-radius:14px;color:#fff;font-size:16px;font-weight:800;cursor:pointer;margin-top:8px}
.ob-next:disabled{opacity:.3}
.ob-back{width:100%;padding:12px;background:none;border:1px solid var(--bd);border-radius:12px;color:var(--dm);font-size:13px;font-weight:600;cursor:pointer;margin-top:8px}
.ob-dots{display:flex;gap:6px;justify-content:center;margin-bottom:20px}
.ob-dot{width:8px;height:8px;border-radius:4px;background:var(--bd)}
.ob-dot.ac{background:var(--ac);width:24px}
.sel-grid{display:flex;gap:6px;flex-wrap:wrap}
.sel-opt{padding:10px 14px;border-radius:10px;border:2px solid var(--bd);background:transparent;color:var(--dm);font-size:12px;font-weight:600;cursor:pointer;flex:1;min-width:calc(50% - 3px);text-align:center}
.sel-opt.on{border-color:var(--ac);color:var(--ac);background:rgba(14,165,233,.1)}
@media(prefers-color-scheme:dark){:root{color-scheme:dark}}
</style>

  const up=useCallback((fn)=>{

      {/* Skincare AM */}
      <Sec title="🧴 AM" right={<Bd c="var(--ac)" ch={`${SKINCARE_AM.filter((s,i)=>s.ph<=cp+1&&tv(`am_${i}`)).length}/${SKINCARE_AM.filter(s=>s.ph<=cp+1).length}`}/>}>
        {SKINCARE_AM.filter(s=>s.ph<=cp+1).map((s,i)=><div key={i} onClick={()=>tg(`am_${i}`)} style={{display:"flex",gap:10,padding:"8px 0",borderTop:i?"1px solid rgba(28,32,48,.5)":"none",cursor:"pointer",opacity:tv(`am_${i}`)?.5:1}}><Ck on={tv(`am_${i}`)}/><div style={{flex:1}}><div style={{fontSize:12,fontWeight:700,color:tv(`am_${i}`)?"var(--dm)":"#e2e5ed"}}>{i+1}. {s.s}</div><div style={{fontSize:10,color:"var(--dm)"}}>{s.p} — {s.d}</div></div></div>)}
      </Sec>

      {/* Skincare PM */}
      <Sec title="🌙 PM" right={<Bd c="var(--pu)" ch={`${SKINCARE_PM.filter((s,i)=>s.ph<=cp+1&&tv(`pm_${i}`)).length}/${SKINCARE_PM.filter(s=>s.ph<=cp+1).length}`}/>} op={false}>
        {SKINCARE_PM.filter(s=>s.ph<=cp+1).map((s,i)=><div key={i} onClick={()=>tg(`pm_${i}`)} style={{display:"flex",gap:10,padding:"8px 0",borderTop:i?"1px solid rgba(28,32,48,.5)":"none",cursor:"pointer",opacity:tv(`pm_${i}`)?.5:1}}><Ck on={tv(`pm_${i}`)}/><div style={{flex:1}}><div style={{fontSize:12,fontWeight:700,color:tv(`pm_${i}`)?"var(--dm)":"#e2e5ed"}}>{i+1}. {s.s}</div><div style={{fontSize:10,color:"var(--dm)"}}>{s.p} — {s.d}</div></div></div>)}
      </Sec>

      {/* Supps */}
      <Sec title="💊 Supps" right={<Bd c="var(--am)" ch={`${SUPPS.filter((s,i)=>s.ph<=cp+1&&tv(`sp_${i}`)).length}/${SUPPS.filter(s=>s.ph<=cp+1).length}`}/>} op={false}>
        {SUPPS.filter(s=>s.ph<=cp+1).map((s,i)=><div key={i} style={{display:"flex",gap:10,padding:"7px 0",borderTop:i?"1px solid rgba(28,32,48,.5)":"none",alignItems:"center"}}><Ck on={tv(`sp_${i}`)} onClick={()=>tg(`sp_${i}`)}/><span style={{flex:1,fontSize:12,fontWeight:600,color:tv(`sp_${i}`)?"var(--dm)":"#e2e5ed"}}>{s.n}</span><span style={{fontSize:10,color:"var(--dm)"}}>{s.w}</span></div>)}
      </Sec>

      {/* Posture */}
      <Sec title="🧘 Postura" right={timer!=null?<Bd c="var(--gn)" ch={`${Math.floor(timerSec/60)}:${String(timerSec%60).padStart(2,"0")}`}/>:null} op={false}>
        {POSTURE.map((p,i)=><div key={i} style={{display:"flex",gap:8,padding:"7px 0",borderTop:i?"1px solid rgba(28,32,48,.5)":"none",alignItems:"center"}}><Ck on={tv(`pos_${i}`)} onClick={()=>tg(`pos_${i}`)}/><span style={{flex:1,fontSize:12,fontWeight:600,color:"#e2e5ed"}}>{p.n} <span style={{color:"var(--dm)",fontWeight:400}}>{p.r}</span></span><button onClick={()=>{setTimer(i);setTimerSec(p.t)}} style={{padding:"4px 8px",background:"var(--c2)",border:"1px solid var(--bd)",borderRadius:6,color:"var(--ac)",fontSize:10,fontWeight:600,cursor:"pointer"}}>{timer===i?`${Math.floor(timerSec/60)}:${String(timerSec%60).padStart(2,"0")}`:`${p.t}s`}</button></div>)}
      </Sec>

      {/* Habits */}
      <Sec title="⚡ Hábitos" op={false}>
        {["Mewing","Mastic gum 20min","Nasal breathing","Sem tela 21:30+"].map((h,i)=><div key={i} onClick={()=>tg(`hab_${i}`)} style={{display:"flex",gap:10,padding:"7px 0",borderTop:i?"1px solid rgba(28,32,48,.5)":"none",cursor:"pointer"}}><Ck on={tv(`hab_${i}`)}/><span style={{fontSize:12,color:tv(`hab_${i}`)?"var(--dm)":"#e2e5ed"}}>{h}</span></div>)}
      </Sec>
      <SaveBtn full/>
    </div>}

    {/* PROTOCOL */}
    {tab==="proto"&&<div style={{padding:"10px 0"}}>
      <div style={{display:"flex",gap:6,margin:"0 12px 10px"}}>{PH.map((ph,i)=><button key={i} onClick={()=>setPhase(i)} style={{flex:1,padding:"10px 4px",background:phase===i?ph.c+"20":"var(--c1)",border:phase===i?`2px solid ${ph.c}`:"2px solid var(--bd)",borderRadius:12,color:phase===i?ph.c:"var(--dm)",cursor:"pointer",fontSize:10,fontWeight:700,textAlign:"center"}}><div style={{fontSize:15}}>{"⚡🔮🔥"[i]}</div>Sem {ph.w}<br/>{pp(i)}%</button>)}</div>
      <div style={{padding:"0 12px 6px"}}><div style={{fontSize:17,fontWeight:800,color:PH[phase].c}}>Fase {PH[phase].id} — {PH[phase].t}</div><Pr p={pp(phase)} c={PH[phase].c}/></div>
      {PH[phase].tk.map(t=><div key={t.id} onClick={()=>tog(t.id)} style={{display:"flex",gap:10,padding:"11px 16px",margin:"0 12px 4px",background:"var(--c1)",borderRadius:12,border:"1px solid var(--bd)",cursor:"pointer",opacity:st[t.id]?.45:1}}><Ck on={st[t.id]}/><span style={{fontSize:12}}>{t.g}</span><span style={{fontSize:13,fontWeight:500,color:st[t.id]?"var(--dm)":"var(--tx)",textDecoration:st[t.id]?"line-through":"none"}}>{t.t}</span></div>)}
      <SaveBtn/>
    </div>}

    {/* LEARN */}
    {tab==="learn"&&<div style={{padding:"10px 0"}}>
      <div style={{padding:"0 16px 10px"}}><div style={{fontSize:17,fontWeight:800,color:"#fff"}}>Ciência</div></div>
      {KNOW.map((c,ci)=><div key={ci} style={{margin:"0 12px 6px"}}><div style={{display:"flex",alignItems:"center",gap:6,padding:"8px 0"}}><span>{c.icon}</span><span style={{fontSize:14,fontWeight:800,color:c.cl}}>{c.cat}</span></div>
        {c.cards.map((k,ki)=>{const o=openK===`${ci}_${ki}`;return<div key={ki} style={{background:"var(--c1)",borderRadius:12,marginTop:5,border:"1px solid var(--bd)",overflow:"hidden"}}><div onClick={()=>setOpenK(o?null:`${ci}_${ki}`)} style={{padding:"11px 14px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:13,fontWeight:700,color:"#e2e5ed"}}>{k.t}</span><span style={{fontSize:10,color:"var(--dm)",transform:o?"rotate(180deg)":"none",transition:".2s"}}>▼</span></div>{o&&<div style={{padding:"0 14px 12px",fontSize:12,color:"var(--tx)",lineHeight:1.6,borderTop:"1px solid rgba(28,32,48,.3)"}}>{k.b}</div>}</div>;})}
      </div>)}
    </div>}

    {/* SHOP */}
    {tab==="shop"&&<div style={{padding:"10px 0"}}>
      <div style={{display:"flex",justifyContent:"space-between",padding:"0 16px 10px"}}><div><div style={{fontSize:17,fontWeight:800,color:"#fff"}}>Compras</div><div style={{fontSize:10,color:"var(--dm)"}}>Nome → loja · check → comprado</div></div><div style={{textAlign:"right"}}><div style={{fontSize:18,fontWeight:800,color:"var(--gn)"}}>£{spt}</div><div style={{fontSize:9,color:"var(--dm)"}}>{bgt}/{shT}</div></div></div>
      {SHOP.map((c,ci)=>{const o=openCat[ci]!==false;return<div key={ci} className="card"><div className="card-h" onClick={()=>setOpenCat(p=>({...p,[ci]:!o}))}><div style={{display:"flex",alignItems:"center",gap:8}}><span>{c.i}</span><h3>{c.cat}</h3></div><span style={{fontSize:11,color:"var(--dm)",transform:o?"rotate(180deg)":"none",transition:".2s"}}>▼</span></div>
        {o&&c.items.map((it,ii)=>{const b=st[`b_${c.cat}_${ii}`];return<div key={ii} style={{display:"flex",gap:10,padding:"10px 16px",borderTop:"1px solid rgba(28,32,48,.2)",alignItems:"center",opacity:b?.4:1}}><Ck on={b} onClick={()=>tog(`b_${c.cat}_${ii}`)}/><div style={{flex:1,minWidth:0}}><a href={it.u} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()} style={{fontSize:12,fontWeight:500,textDecoration:b?"line-through":"none",display:"block"}}>{it.n} ↗</a><Bd c={PH[it.ph-1].c} ch={`Fase ${it.ph}`}/></div><span style={{fontSize:12,fontWeight:700,color:"var(--gn)"}}>£{it.p}</span></div>;})}
      </div>;})}
      <SaveBtn/>
    </div>}

    {/* STATS */}
    {tab==="stats"&&<div style={{padding:"10px 0"}}>
      <div style={{background:"var(--c1)",borderRadius:14,margin:"0 12px 8px",padding:"14px 16px",border:"1px solid var(--bd)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}><span style={{fontSize:14,fontWeight:700,color:"#e2e5ed"}}>⚙️ Perfil</span><button onClick={()=>setEditProf(!editProf)} style={{padding:"4px 10px",background:editProf?"rgba(16,185,129,.15)":"var(--c2)",border:editProf?"1px solid var(--gn)":"1px solid var(--bd)",borderRadius:6,color:editProf?"var(--gn)":"var(--dm)",fontSize:10,fontWeight:700,cursor:"pointer"}}>{editProf?"Fechar":"Editar"}</button></div>
        {editProf?<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          {[{k:"name",l:"Nome",t:"text"},{k:"weight",l:"Peso (kg)"},{k:"bf",l:"BF%"},{k:"bfGoal",l:"BF% meta"},{k:"kcal",l:"Kcal"},{k:"prot",l:"Prot (g)"}].map(f=><div key={f.k}><label className="ob-label">{f.l}</label><input type={f.t||"number"} value={prof[f.k]||""} onChange={e=>savePf(f.k,f.t==="text"?e.target.value:(+e.target.value||0))}/></div>)}
        </div>:<div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          <Bd c="var(--ac)" ch={`${prof.weight}kg`}/><Bd c="var(--rd)" ch={`BF ${prof.bf}→${prof.bfGoal}%`}/><Bd c="var(--gn)" ch={`${prof.kcal}kcal·${prof.prot}g`}/><Bd c="var(--pu)" ch={`Dia ${dayN}·F${cp+1}`}/>
        </div>}
      </div>

      {/* BF */}
      <div style={{background:"var(--c1)",borderRadius:14,margin:"0 12px 8px",padding:"14px 16px",border:"1px solid var(--bd)"}}><div style={{fontSize:13,fontWeight:700,color:"#e2e5ed",marginBottom:8}}>Body Fat → Face</div><div style={{display:"flex",gap:3}}>
        {[{r:"<8",l:"Gaunt",lo:0,hi:8},{r:"8-12",l:"Ideal",lo:8,hi:12},{r:"12-15",l:"Lean",lo:12,hi:15},{r:"15-18",l:"OK",lo:15,hi:18},{r:"18-22",l:"Soft",lo:18,hi:22},{r:">22",l:"Hidden",lo:22,hi:99}].map((z,i)=>{const bf=+(prof.bf||20);const isU=bf>=z.lo&&bf<z.hi;const isG=i===1||i===2;return<div key={i} style={{flex:1,textAlign:"center",padding:"7px 2px",borderRadius:6,background:isU?"rgba(239,68,68,.12)":isG?"rgba(16,185,129,.08)":"transparent",border:isU?"1px solid rgba(239,68,68,.3)":isG?"1px solid rgba(16,185,129,.15)":"1px solid rgba(28,32,48,.25)"}}><div style={{fontSize:8,fontWeight:700,color:isU?"var(--rd)":isG?"var(--gn)":"var(--dm)"}}>{z.r}%</div><div style={{fontSize:7,color:"var(--dm)"}}>{z.l}</div>{isU&&<div style={{fontSize:6,color:"var(--rd)"}}>Tu</div>}</div>;})}
      </div></div>

      {/* Rotation */}
      <div style={{background:"var(--c1)",borderRadius:14,margin:"0 12px 8px",padding:"14px 16px",border:"1px solid var(--bd)"}}><div style={{fontSize:13,fontWeight:700,color:"#e2e5ed",marginBottom:8}}>Rotações</div>
        {[{l:"Dieta",it:["Original","Comfort","Meal-Prep"]},{l:"Treino",it:["Original","Volume","Power"]}].map((r,ri)=>{const wk=(Math.floor((dayN-1)/7))%3;return<div key={ri} style={{marginTop:ri?8:0}}><div style={{fontSize:10,fontWeight:700,color:"var(--dm)",marginBottom:3}}>{r.l}</div><div style={{display:"flex",gap:3}}>{r.it.map((it,ii)=><div key={ii} style={{flex:1,padding:"6px 3px",borderRadius:7,background:wk===ii?"rgba(14,165,233,.12)":"transparent",border:wk===ii?"1px solid rgba(14,165,233,.3)":"1px solid rgba(28,32,48,.25)",textAlign:"center"}}><div style={{fontSize:9,fontWeight:wk===ii?700:400,color:wk===ii?"var(--ac)":"var(--dm)"}}>{it}</div></div>)}</div></div>;})}
      </div>

      <SaveBtn full/>
      <div style={{textAlign:"center",marginTop:10}}><button onClick={()=>{if(confirm("Resetar TUDO e voltar ao setup?")){localStorage.removeItem("la_state");localStorage.removeItem("la_profile");location.reload();}}} style={{background:"none",border:"none",color:"var(--dm)",fontSize:10,cursor:"pointer",padding:8}}>Resetar tudo</button></div>
    </div>}

    {/* NAV */}
    <div className="nav"><div className="nav-in">
      {[{id:"today",i:"◉",l:"Hoje"},{id:"proto",i:"◈",l:"90 Dias"},{id:"learn",i:"◇",l:"Ciência"},{id:"shop",i:"△",l:"Compras"},{id:"stats",i:"◎",l:"Stats"}].map(t=><button key={t.id} className="nav-b" onClick={()=>setTab(t.id)} style={{color:tab===t.id?"var(--ac)":"var(--dm)"}}><span className="ni">{t.i}</span>{t.l}</button>)}
    </div></div>
  </div>;
}

/* ═══ ROOT ═══ */
function Root(){
  const [profile,setProfile]=useState(()=>LS.get("la_profile"));
  if(!profile) return <Onboarding onComplete={setProfile}/>;
  return <MainApp profile={profile}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
